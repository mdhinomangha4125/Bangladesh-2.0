<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangladesh 2.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }

        header,
        main {
            width: 90%;
            margin-left: auto;
            margin-right: auto;
        }

        h3 {
            font-size: 32px;
            font-weight: bold;
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 32px 0;
        }

        button {
            padding: 8px 20px;
            border-radius: 10px;
            color: white;
            font-weight: 700;
            border: none;
        }

        .si-btn {
            border: 2px solid #006A50;
            color: #006A50;
        }

        .si-btn:hover {
            background: #006A50;
            color: white;
        }

        .hero {
            background-color: #C6E4D6;
            padding: 40px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            gap: 24px;
        }
        .hero-d1{
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .hero-text{
            font-size: 48px;
            font-weight: bold;
        }
        .hero-img{
            width: 80%;
        }
        .hero-img img{
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>

<body style="background: #F5F5F5;">
    <header style="margin-bottom: 72px;">
        <nav>
            <h3>Bangladesh 2.0</h3>
            <button type="submit" class="si-btn">Sign In</button>
        </nav>
        <section class="hero">
            <div class="hero-d1">
                <h4 style="opacity: 50%;font-size: x-large;">Bangladesh 2.0</h4>
                <p class="hero-text">Idea, innovation, vision and challenges in New Bangladesh.</p>
                <div><button style="background-color: #006A50;">Explore New Bangladesh</button></div>
            </div>
            <div class="hero-img"><img src="./assets/hero.png" alt="hero"></div>
        </section>
    </header>
    <main>
        <section>
            <h3>Pillars of "Bangladesh 2.0"</h3>
        </section>
        <section>
            <h3>The Vision of Future</h3>
        </section>
        <section>
            <h3>Your Opinion Matters</h3>
        </section>
        <section>
            <h3>Recent News</h3>
        </section>
        <section>
            <h3>Donate Today</h3>
        </section>
        <section>
            <h3>Subscribe Newsletter</h3>
        </section>
    </main>
    <footer>
        <section>
            <h3>Bangladesh 2.0</h3>
        </section>
    </footer>
</body>

</html>
